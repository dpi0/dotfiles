monitor = eDP-1, 1920x1080@60, 1920x1080, 1

env = QT_QPA_PLATFORM,wayland
env = XDG_CURRENT_DESKTOP,Hyprland

exec-once = [workspace 1] firefox
exec-once = [workspace 2] kitty -e tmux new -As main
exec-once = hypridle >> ~/.cache/hypridle.log 2>&1
exec-once = dunst
exec-once = swww-daemon
exec-once = gammastep
exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist -max-items 5000 store
exec-once = wl-paste --type image --watch cliphist -max-items 5000 store

source = ~/.dotfiles/hypr/hyprbinds.conf

debug {
  disable_logs = true
  enable_stdout_logs = true
}

input {
  kb_layout  = us
  kb_variant =
  kb_model   =
  kb_options = caps:escape
  kb_rules   =
  follow_mouse       = 1
  numlock_by_default = false
  sensitivity = 0

  touchpad {
    natural_scroll       = no
    disable_while_typing = true
    scroll_factor        = 1.6
  }
}

general {
  gaps_in    = 3
  gaps_out   = 6
  border_size = 0
  layout        = dwindle
  allow_tearing = false
}

decoration {
  rounding = 1
  dim_inactive = 1
  dim_strength = 0.2

  blur {
    enabled = false
  }

  shadow {
    enabled = false
  }
}

animations {
  enabled = no
}

dwindle {
  pseudotile     = yes
  preserve_split = yes
}


misc {
  force_default_wallpaper   = 0
  mouse_move_enables_dpms   = false
  key_press_enables_dpms    = true
  disable_hyprland_logo     = true
  disable_splash_rendering  = true
  vfr                       = true
  allow_session_lock_restore = true
}

windowrule = idleinhibit focus, class:^(.*Spotify.*)$
windowrule = idleinhibit focus, class:^(.*firefox.*)$

windowrule = opacity 1.0, class:^(.*Alacritty.*)$
windowrule = opacity 0.9, class:^(.*Code.*)$

windowrule = noborder, class:^(.*Code.*)$
windowrule = noborder, class:^(.*Insomnium.*)$
windowrule = noborder, class:^(.*Spotify.*)$
windowrule = noborder, class:^(.*firefox.*)$
windowrule = noborder, class:^(.*org.gnome.clocks.*)$

windowrule = float, class:^(.*dragon.*)$
windowrule = float, class:^(.*nm-connection-editor.*)$
windowrule = float, class:^(.*org.gnome.clocks.*)$
windowrule = float, class:^(.*showmethekey-gtk.*)$
windowrule = float, class:^(.*org.kde.polkit-kde-authentication-agent-1.*)$

windowrule = pin, class:^(.*dragon.*)$
windowrule = pin, class:^(.*showmethekey-gtk.*)$

windowrule = size 500 600, class:^(.*org.gnome.clocks.*)$
windowrule = size 30%, class:^(.*showmethekey-gtk.*)$

windowrule = center, class:^(.*org.gnome.clocks.*)$
windowrule = center, class:^(.*org.kde.polkit-kde-authentication-agent-1.*)$
windowrule = center, class:^(.*showmethekey-gtk.*)$

windowrule = workspace 1, class:^(.*firefox.*)$

windowrule = center, class:^(.*kitty.*)$
windowrule = pseudo, class:^(.*kitty.*)$
windowrule = size 72% 100%, class:^(.*kitty.*)$

gesture = 4, horizontal, workspace
gesture = 4, down, dispatcher, exec, wtype -M ctrl -k t -m ctrl
gesture = 4, up, dispatcher, exec, wtype -M ctrl -k t -m ctrl
gesture = 3, right, dispatcher, exec, wtype -M ctrl -k Tab -m ctrl
gesture = 3, left, dispatcher, exec, wtype -M ctrl -M shift -k Tab -m shift -m ctrl
gesture = 3, up, dispatcher, exec, wtype -M ctrl -k w -m ctrl
gesture = 3, down, dispatcher, exec, wtype -k F5
# gesture = 3, down, dispatcher, sendshortcut 'CTRL_SHIFT, TAB, class:^(firefox)$' # https://github.com/hyprwm/Hyprland/discussions/11684?utm_source=chatgpt.com
# gesture = 3, right, dispatcher, exec, YDOTOOL_SOCKET="$HOME/.ydotool_socket" ydotool key 29:1 15:1 15:0 29:0
# gesture = 3, left, dispatcher, exec, YDOTOOL_SOCKET="$HOME/.ydotool_socket" ydotool key 29:1 42:1 15:1 15:0 42:0 29:0
