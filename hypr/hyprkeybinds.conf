# --- VARIABLES ---
$browser = firefox
$terminal = alacritty 
$code = codium
$sublime_text = subl
$fileManager = thunar
$menu = rofi -show drun
$menu_extended = rofi -show run
$color_picker = ~/.dotfiles/dunst/scripts/hyprpicker-notify.sh
# $screenshot = grim -g "$(slurp)" "/mnt/data/screenshots/S $(date "+%H:%M:%S %d-%b")".png; notify-send -u normal "Screenshot Taken"
# $screenshot_fullscreen = grim "/mnt/data/screenshots/S $(date "+%H:%M:%S %d-%b")".png; notify-send -u normal "Screenshot Taken"
$screenshot = grim -g "$(slurp)" - | swappy -f -; notify-send -u normal "Screenshot Taken"
$screenshot_fullscreen = grim -g "$(slurp)" - | swappy -f -; notify-send -u normal "Screenshot Taken"
$emoji = gnome-characters
$wallpaper = hyprctl hyprpaper wallpaper "eDP-1, $DATA/wallpapers/citylights.jpg"

# --- BINDS ---
$mainMod = SUPER

# --- Launch Apps ---
bind = $mainMod SHIFT, Return, exec, $terminal
bind = $mainMod SHIFT, Q,  exec, $code
bind = $mainMod SHIFT, R,  exec, $sublime_text
bind = $mainMod SHIFT, E, exec, $fileManager
bind = $mainMod SHIFT, Space, exec, $menu_extended

# tools
bind = $mainMod, slash, exec, $screenshot
bind = $mainMod SHIFT, slash, exec, $screenshot_fullscreen
bind = $mainMod, space, exec, $menu
bind = $mainMod, period, exec, [silent;float] $emoji
bind = $mainMod, comma, exec, $color_picker
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod, K, exec, busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Temperature q 3000 | ~/.local/bin/nightnotify
bind = $mainMod SHIFT, K, exec, busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Temperature q 6500 | ~/.local/bin/nightnotify

#bind = SUPER, Y, exec, [workspace 3 silent;float;noanim] $fileManager

# ******** WINDOWS ********
# --- Manage Windows ---
bind = $mainMod, F, togglefloating, 
bind = $mainMod SHIFT, F, togglesplit, # dwindle
bind = $mainMod, C, killactive, # closes (not kills) the active window
bind = $mainMod ALT, M, exit, 
bind = $mainMod ALT, P, pseudo, # dwindle
bind = $mainMod SHIFT, P, pin
bind = $mainMod, B, fullscreen, 1
bind = $mainMod SHIFT, B, focuswindow, 
bind = $mainMod, A, focuscurrentorlast

# --- Move to A Window ---
bind = $mainMod, Q, focuswindow, Code
bind = $mainMod, Return, focuswindow, Alacritty
bind = $mainMod, R, focuswindow, subl

# --- Groups ---
#bind = $mainMod, L, lockactivegroup, 
bind = $mainMod, G, togglegroup
bind = $mainMod SHIFT, G, changegroupactive, f
bind = $mainMod CTRL, G, changegroupactive, b

# --- Move window ---
bind = $mainMod SHIFT, left, swapwindow, l
bind = $mainMod SHIFT, right, swapwindow, r
bind = $mainMod SHIFT, up, swapwindow, u
bind = $mainMod SHIFT, down, swapwindow, d

# --- Move focus ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- Manage Misc ---
bind = $mainMod, W, exec, killall -SIGUSR1 waybar
bind = $mainMod, L, exec, swaylock
bind = $mainMod, semicolon, exec, wlogout


# ******** WORKSPACE ********
# --- Move to workspace ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move active window to a workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# --- Move/resize windows ---
bindm = $mainMod, mouse:272, movewindow
bindm =  SHIFT, mouse:272, resizewindow

# --- bluetooth ---
bind = $mainMod, Y, exec, bluetoothctl power on; bluetoothctl connect 74:45:CE:DB:25:A1
bind = $mainMod SHIFT, Y, exec, bluetoothctl power off
bind = $mainMod CTRL, Y, exec, systemctl stop bluetooth
bind = $mainMod SHIFT_CTRL, Y, exec, systemctl start bluetooth


# --- brightness ---
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+ | ~/.local/bin/brightnotify
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%- | ~/.local/bin/brightnotify
bind = , KP_Enter, exec, brightnessctl set 5%- | ~/.local/bin/brightnotify
bind = , KP_Add, exec, brightnessctl set 5%+| ~/.local/bin/brightnotify
bind = CTRL, XF86MonBrightnessDown, exec, brightnessctl set 20%- | ~/.local/bin/brightnotify
bind = CTRL, XF86MonBrightnessUp, exec, brightnessctl set 20%+ | ~/.local/bin/brightnotify

# --- night light ---
bind = SHIFT, XF86MonBrightnessDown, exec, busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateTemperature n -500 | ~/.local/bin/nightnotify
bind = SHIFT, XF86MonBrightnessUp, exec, busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateTemperature n +500 | ~/.local/bin/nightnotify

# --- volume ---
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +2% | ~/.local/bin/volnotify
bind = , KP_Next, exec, pactl set-sink-volume @DEFAULT_SINK@ +2% | ~/.local/bin/volnotify
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -2% | ~/.local/bin/volnotify
bind = , KP_End, exec, pactl set-sink-volume @DEFAULT_SINK@ -2% | ~/.local/bin/volnotify
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle | ~/.local/bin/volnotify

# --- mic ---
bind = SHIFT, XF86AudioRaiseVolume, exec, pamixer --default-source -i 5 | ~/.local/bin/micnotify
bind = SHIFT, XF86AudioLowerVolume, exec, pamixer --default-source -d 5 | ~/.local/bin/micnotify
bind = SHIFT, XF86AudioMute, exec, pamixer --default-source -t | ~/.local/bin/micnotify

# --- media control ---
bind = , KP_Down, exec, playerctl play-pause
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next
bind = , KP_Begin, exec, playerctl play-pause
bind = , KP_Left, exec, playerctl previous
bind = , KP_Right, exec, playerctl next
#playerctl --player=vlc next
#playerctl --player=spotify, musicbee, firefox next

# --- power control ---
bind = $mainMod, End, exec, systemctl suspend
bind = $mainMod SHIFT, End, exec, systemctl reboot
bind = $mainMod ALT, End, exec, systemctl shutdown
bind = $mainMod, I, exec, ~/.local/bin/batnotify
bind = $mainMod, O, exec, ~/.local/bin/timenotify

# --- Example special workspace (scratchpad) ---
bind = $mainMod ALT, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# bind = SUPER, F10 , pass ,^(firefox)$