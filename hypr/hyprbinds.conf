$SCRIPTS = ~/scripts

bind = super, r, exec, firefox -P dpi0
bind = super, e, exec, nautilus
bind = super, f, exec, $SCRIPTS/rofi/file-finder.sh
bind = super, w, exec, $SCRIPTS/rofi/swww-wallpaper.sh
bind = super, o, exec, $SCRIPTS/rofi/screenshot.sh
bind = super, c, exec, $SCRIPTS/rofi/calculator.sh
bind = super, s, exec, $SCRIPTS/rofi/ssh.sh
bind = super, i, exec, $SCRIPTS/rofi/common-actions.sh
bind = super, v, exec, $SCRIPTS/rofi/clipboard.sh
bind = super, t, exec, $SCRIPTS/toggle-light-dark-mode.sh
bind = super, n, exec, dunstctl close-all # dismiss all notifications
bind = super, a, focuscurrentorlast
bind = super, d, fullscreen, 1
bind = super, h, workspace, -1
bind = super, l, workspace, +1
bind = super, return, exec, kitty
bind = super, backspace, exec, $SCRIPTS/rofi/power-menu.sh
bind = super, tab, exec, $SCRIPTS/rofi/common-actions.sh
bind = super, comma, exec, $SCRIPTS/color-picker.sh
bind = super, slash, exec, $SCRIPTS/screenshot/area.sh
bind = super, space, exec, $SCRIPTS/rofi/apps.sh
bind = super, period, exec, $SCRIPTS/rofi/emoji.sh
bind = super, semicolon, exec, hyprlock
bind = super, Escape, killactive
bind = super shift, space, exec, $SCRIPTS/rofi/binaries.sh
bind = super shift, c, exec, [float; center 1; pin] qalculate-gtk
bind = super shift, slash, exec, $SCRIPTS/screenshot/fullscreen.sh
bind = super shift, o, exec, $SCRIPTS/restart-networkmanager.sh
bind = super shift, g, exec, firefox -P guest
bind = super shift, d, togglesplit
bind = super shift, p, pin
bind = super shift, h, movetoworkspace, -1
bind = super shift, l, movetoworkspace, +1
bind = super shift, k, exec, hyprctl keyword cursor:zoom_factor 1
bind = super ctrl shift, slash, exec, $SCRIPTS/screenshot/fullscreen-upload.sh
bind = super ctrl, slash, exec, $SCRIPTS/screenshot/area-upload.sh
bind = super ctrl, j, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor * 1.25}')"
bind = super ctrl, k, exec, hyprctl keyword cursor:zoom_factor "$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {factor = $2; if (factor < 1) {factor = 1}; print factor / 1.25}')"
bind = super ctrl alt, slash, exec, $SCRIPTS/screenshot/annotated-upload.sh
bind = super alt, slash, exec, $SCRIPTS/screenshot/annotated.sh
bind = super alt, o, exec, $SCRIPTS/check-internet-connection.sh
bind = super alt, P, pseudo, # dwindle
bind = , XF86RFKill, exec, $SCRIPTS/toggle-airplane-mode.sh
bind = , XF86PowerOff, exec, $SCRIPTS/rofi/power-menu.sh
bind = , KP_Down, exec, playerctl --player=firefox play-pause
bind = , KP_Left, exec, playerctl --player=firefox previous
bind = , KP_Right, exec, playerctl --player=firefox next
bind = alt, Tab, focuscurrentorlast

bind = super, m, exec, xdg-open https://mail.google.com/mail/u/0/; hyprctl dispatch workspace 1
bind = super, p, exec, xdg-open https://mail.proton.me/u/0/inbox/; hyprctl dispatch workspace 1
bind = super shift, m, exec, xdg-open https://mail.google.com/mail/u/1/; hyprctl dispatch workspace 1
bind = super shift, p, exec, xdg-open https://mail.proton.me/u/1/inbox/; hyprctl dispatch workspace 1

bind = super, 1, workspace, 1
bind = super, 2, workspace, 2
bind = super, 3, workspace, 3
bind = super, 4, workspace, 4
bind = super, 5, workspace, 5
bind = super, 6, workspace, 6
bind = super, 7, workspace, 7
bind = super, 8, workspace, 8
bind = super, 9, workspace, 9
bind = super, 0, workspace, 10
bind = super, minus, workspace, 11
bind = super, equal, workspace, 12
bind = super shift, 1, movetoworkspace, 1
bind = super shift, 2, movetoworkspace, 2
bind = super shift, 3, movetoworkspace, 3
bind = super shift, 4, movetoworkspace, 4
bind = super shift, 5, movetoworkspace, 5
bind = super shift, 6, movetoworkspace, 6
bind = super shift, 7, movetoworkspace, 7
bind = super shift, 8, movetoworkspace, 8
bind = super shift, 9, movetoworkspace, 9
bind = super shift, 0, movetoworkspace, 10
bindm = super, mouse:272, movewindow
bindm = super shift, mouse:272, resizewindow

# BRIGHTNESS
$BRIGHTNESS_UP = brightnessctl set 5%+
$BRIGHTNESS_DOWN = brightnessctl set 5%-
bind = , XF86MonBrightnessUp, exec, $BRIGHTNESS_UP | $SCRIPTS/notify/brightness.sh
bind = , XF86MonBrightnessDown, exec, $BRIGHTNESS_DOWN | $SCRIPTS/notify/brightness.sh
bind = , KP_Add, exec, $BRIGHTNESS_UP | $SCRIPTS/notify/brightness.sh
bind = , KP_Enter, exec, $BRIGHTNESS_DOWN | $SCRIPTS/notify/brightness.sh
bind = super shift, k, exec, $BRIGHTNESS_UP | $SCRIPTS/notify/brightness.sh
bind = super shift, j, exec, $BRIGHTNESS_DOWN | $SCRIPTS/notify/brightness.sh

# VOLUME
$VOLUME_UP = pactl set-sink-volume @DEFAULT_SINK@ +2%
$VOLUME_DOWN = pactl set-sink-volume @DEFAULT_SINK@ -2%
bind = , XF86AudioRaiseVolume, exec, $VOLUME_UP | $SCRIPTS/notify/volume.sh
bind = , XF86AudioLowerVolume, exec, $VOLUME_DOWN | $SCRIPTS/notify/volume.sh
bind = , KP_Next, exec, $VOLUME_UP | $SCRIPTS/notify/volume.sh
bind = , KP_End, exec, $VOLUME_DOWN | $SCRIPTS/notify/volume.sh
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle | $SCRIPTS/notify/volume.sh

# MIC
$MIC_CONTROL = pamixer --default-source
bind = shift, XF86AudioRaiseVolume, exec,  $MIC_CONTROL -i 5 | $SCRIPTS/notify/mic.sh
bind = shift, XF86AudioLowerVolume, exec, $MIC_CONTROL -d 5 | $SCRIPTS/notify/mic.sh
bind = shift, XF86AudioMute, exec, $MIC_CONTROL -t | $SCRIPTS/notify/mic.sh

# POWER
bind = super ctrl, end, exec, systemctl poweroff
bind = super shift, end, exec, systemctl reboot
bind = super alt, end, exec, $SCRIPTS/reboot-to-windows.sh
# bind = super, end, exec, systemctl hibernate
