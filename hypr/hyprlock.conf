$font = JetBrainsMono NF

general {
  hide_cursor = false
}

animations {
  enabled = false
}

background {
  monitor = eDP-1
  # path = $HOME/Wallpapers/dusk.jpeg
  path = screenshot
  blur_passes = 3
  color = rgb(10, 10, 10)
}

input-field {
  monitor = eDP-1
  size = 10%, 5%
  outline_thickness = 1
  inner_color = rgba(0, 0, 0, 0.0) # no fill
  fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg
  font_color = rgb(143, 143, 143)
  fade_on_empty = false
  rounding = 15
  font_family = $font
  placeholder_text = Password...
  fail_text = Wrong!
  dots_text_format = *
  dots_size = 0.4
  dots_spacing = 0.3
  halign = center
  valign = center
}

# TIME
label {
  monitor = eDP-1
  text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
  font_size = 90
  font_family = $font
  position = -30, 0
  halign = right
  valign = top
}

# DATE
label {
  monitor = eDP-1
  text = cmd[update:60000] date +"%A, %d %B %Y" # update every 60 seconds
  font_size = 25
  font_family = $font
  position = -30, -150
  halign = right
  valign = top
}

# BATTERY
label {
  monitor = eDP-1
  text = cmd[update:1000] echo -e "$($HOME/scripts/battery-status-hyprlock.sh)"
  font_size = 20
  font_family = $font
  position = -30, 30
  halign = right
  valign = bottom
}
