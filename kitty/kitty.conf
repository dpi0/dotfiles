font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size	11.0
# background_opacity 0.9
background_opacity 0.9
dynamic_background_opacity yes
# background #000000

copy_on_select yes

# map ctrl+shift+c copy_to_clipboard
map ctrl+v paste_from_clipboard
confirm_os_window_close 0
map alt+shift+u new_tab
map alt+shift+h previous_tab
map alt+shift+l next_tab
map alt+shift+w close_window
map alt+shift+ctrl+l move_tab_forward
map alt+shift+ctrl+h move_tab_backward
map alt+shift+r set_tab_title
map alt+shift+1 goto_tab 1
map alt+shift+2 goto_tab 2
map alt+shift+3 goto_tab 3
map alt+shift+4 goto_tab 4
map alt+shift+0 goto_tab 5
map ctrl+f show_scrollback
mouse_map left click ungrabbed no-op
map alt+shift+enter toggle_fullscreen

scrollback_lines 5000
wheel_scroll_multiplier 3.0

cursor_blink_interval 0.5

tab_bar_style separator
tab_separator ""
tab_activity_symbol *
tab_bar_edge bottom
tab_bar_align left
active_tab_font_style   bold
inactive_tab_font_style normal
tab_title_template        "{fmt.fg._5c6370}{fmt.bg.default}{fmt.fg._abb2bf}{fmt.bg._5c6370} {fmt.fg.red}{activity_symbol}{fmt.fg._abb2bf}{index}: {title}{' [{}]'.format(num_windows) if num_windows > 1 else ''} {fmt.fg._5c6370}{fmt.bg.default} "
active_tab_title_template "{fmt.fg._282c34}{fmt.bg.default}{fmt.fg._abb2bf}{fmt.bg._282c34} {fmt.fg.red}{activity_symbol}{fmt.fg._abb2bf}{index}: {title}{' [{}]'.format(num_windows) if num_windows > 1 else ''} {fmt.fg._282c34}{fmt.bg.default} "

# BEGIN_KITTY_THEME
# Paul Millr
# include current-theme.conf
# END_KITTY_THEME

# map alt+shift+backspace send_text all \x1b[90;5u
